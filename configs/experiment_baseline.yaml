experiment_name: tw-stock-expanding-walkforward

runner:
  output_dir: artifacts
  require_cuda: true
  mode: train
  resume: true
  post_train_infer: true
  start_fold: 1

environment:
  conda_env: fintech
  device: cuda
  use_tensor_cores: true
  amp_dtype: bf16
  target_vram_fraction: 0.85

data:
  parquet_root: data_yahoo/tw_stocks
  # benchmark_name: "BTCUSDTSWAP"
  benchmark_name: "universe_average"
  benchmark_required: false
  benchmark_source: derived_from_panel
  universe_mode: all_daily_symbols
  use_rapids: false
  usd_only_trading_pairs: false
  buy_tradable_mode: tw_limit_guard
  sell_tradable_mode: tw_limit_guard

walk_forward:
  min_train_years: 1
  val_years: 1
  require_future_test_year: false

trading:
  frequency: daily
  buy_fee_rate: 0.001425
  sell_fee_rate: 0.004425
  max_turnover_ratio: 100.0
  gross_leverage: 1.0
  long_only: false
  cash_allowed: true

training:
  backend: pytorch
  target: next_1d_rank
  batch_mode: time_window_x_all_symbols
  non_blocking_transfer: true
  model_name: tabular_resnet
  enable_torch_compile: false
  auto_torch_compile_sharpe: false
  compile_loss: null
  warm_start_from_previous_fold: false
  chunk_rows: 0
  train_symbol_subsample_ratio: 1.0
  detach_prev_state: true
  prefer_fp16: true
  backtest_autotune: false
  backtest_compile: false
  backtest_verbose: false
  backtest_checkpoint_chunk_rows: 0
  runtime_shape_check: false
  allow_dynamic_symbols: true
  lookback: 1
  batch_size: 2048
  batch_size_train: 2048
  batch_size_eval: 2048
  epochs: 1000
  early_stopping_no_improve_ratio: 0.2
  val_interval_epochs: 1
  learning_rate: 0.001
  enable_lr_scheduler: false
  lr_scheduler: plateau
  lr_scheduler_gamma: 0.5
  lr_scheduler_patience: 10
  lr_scheduler_threshold: 0.0005
  top_k: 20
  hidden_dim: 1024
  hidden_layers: 1
  dropout: 0.1
  num_workers: 0
  weight_decay: 0.00001
  grad_clip_norm: 1.0
  loss_type: excess_cvar_drawdown
  min_batch_size: 1
  auto_batch_size: true
  vram_budget_gb: 16
  vram_safety_margin_gb: 0.7
  target_vram_fraction: 1
  mlp:
    hidden_dim: 1024
    hidden_layers: 2
    embedding_dim: 64
    dropout: 0.1
  ft_transformer:
    d_token: 64
    n_layers: 2
    n_heads: 4
    ffn_dim: 256
    dropout: 0.1
    use_cls_token: true
  tabular_resnet:
    embedding_dim: 128
    hidden_dim: 256
    n_blocks: 4
    dropout: 0.1
  tcn_hybrid_tabular_resnet:
    embedding_dim: 64
    encoder_hidden_dim: 128
    encoder_blocks: 2
    tcn_blocks: 2
    tcn_kernel_size: 3
    dropout: 0.3
  temporal_tabular_resnet:
    temporal_hidden_dim: 128
    temporal_layers: 1
    temporal_dropout: 0.3
    embedding_dim: 128
    hidden_dim: 256
    n_blocks: 4
    dropout: 0.1
  lightgbm:
    use_gpu: true
    gpu_device_id: 0
    n_estimators: 300
    num_leaves: 63
    max_depth: -1
    learning_rate: 1
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    n_jobs: -1
    random_state: 42
  xgboost:
    use_gpu: true
    gpu_device_id: 0
    n_estimators: 300
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    n_jobs: -1
    random_state: 42

evaluation:
  primary_baseline: "2330"
  metrics:
    - cumulative_return
    - annualized_return
    - sharpe
    - sortino
    - max_drawdown
    - turnover
    - excess_return_vs_universe_average
  gamma_sharpe: 1.0
  gamma_excess: 1.0
  gamma_cvar: 1.0
  cvar_alpha: 0.95
  gamma_drawdown: 0.5
  drawdown_target: 0.2
  gamma_turnover: 0.0