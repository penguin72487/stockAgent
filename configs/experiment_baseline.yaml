experiment_name: tw-stock-expanding-walkforward

runner:
  output_dir: artifacts
  require_cuda: true

environment:
  conda_env: fintech
  device: cuda
  use_tensor_cores: true
  amp_dtype: bf16

data:
  parquet_root: data_parquet
  benchmark_name: universe_average_return
  benchmark_required: false
  benchmark_source: derived_from_panel
  universe_mode: all_daily_symbols

walk_forward:
  mode: expanding_by_year
  min_train_years: 1
  val_years: 1
  test_years: remaining
  require_future_test_year: true

trading:
  frequency: daily
  fee_per_side: 0.001
  long_only: true
  cash_allowed: true
  use_all_tradable_symbols: true

training:
  backend: pytorch
  target: next_1d_rank
  batch_mode: time_window_x_all_symbols
  non_blocking_transfer: true
  lookback: 1
  batch_size: 1024
  epochs: 100
  learning_rate: 0.001
  hidden_dim: 1024
  dropout: 0.1
  top_k: 20
  num_workers: 16
  weight_decay: 0.00001
  loss_type: sharpe

evaluation:
  primary_baseline: universe_average_return
  metrics:
    - cumulative_return
    - annualized_return
    - sharpe
    - max_drawdown
    - turnover
    - excess_return_vs_universe_average