experiment_name: tw-stock-expanding-walkforward

runner:
  output_dir: artifacts
  require_cuda: true

environment:
  conda_env: fintech
  device: cuda
  use_tensor_cores: true
  amp_dtype: bf16
  target_vram_fraction: 0.85

data:
  parquet_root: data_parquet
  benchmark_name: universe_average_return
  benchmark_required: false
  benchmark_source: derived_from_panel
  universe_mode: all_daily_symbols
  use_rapids: true

walk_forward:
  min_train_years: 1
  val_years: 1
  require_future_test_year: false

trading:
  frequency: daily
  fee_per_side: 0.0
  buy_fee_rate: 0.001425
  sell_fee_rate: 0.002925
  long_only: true
  cash_allowed: true
  use_all_tradable_symbols: true

# model:
#   name: mlp
#   config_path: models/mlp.yaml

# model:
#   name: temporal_cross_asset
#   config_path: models/temporal_cross_asset.yaml

model:
  name: portfolio_transformer
  config_path: models/portfolio_transformer.yaml

training:
  backend: pytorch
  target: daily_return
  batch_mode: time_window_x_all_symbols
  non_blocking_transfer: true
  enable_torch_compile: true
  torch_compile_mode: reduce-overhead
  compile_max_autotune_gemm: "on"   # auto | on | off
  compile_autotune_min_sms: 66
  batch_size: 2048
  batch_size_train: 2048
  batch_size_eval: 2048
  epochs: 1000
  learning_rate: 0.001
  num_workers: 16
  weight_decay: 0.00001
  loss_type: sharpe
  min_batch_size: 1
  auto_batch_size: true
  batch_safety_factor: 0.9
  vram_budget_gb: 16
  vram_safety_margin_gb: 0.7
  target_vram_fraction: 0.9

evaluation:
  primary_baseline: universe_average_return
  metrics:
    - cumulative_return
    - annualized_return
    - sharpe
    - max_drawdown
    - turnover
    - excess_return_vs_universe_average
  gamma_sharpe: 1.0
  gamma_turnover: 0.1