experiment_name: tw-stock-expanding-walkforward

runner:
  output_dir: artifacts
  require_cuda: true

environment:
  conda_env: fintech
  device: cuda
  use_tensor_cores: true
  amp_dtype: bf16
  target_vram_fraction: 0.7

data:
  parquet_root: data_yahoo_tw_ohlcv
  benchmark_name: "0050"
  benchmark_required: true
  benchmark_source: symbol_ohlcv
  universe_mode: all_daily_symbols

walk_forward:
  min_train_years: 1
  val_years: 1
  require_future_test_year: false

trading:
  frequency: daily
  fee_per_side: 0.0
  long_only: false
  cash_allowed: true
  use_all_tradable_symbols: true
  # execution_mode: "overnight_tplus2"
  # execution_mode: "intraday_next_open" # "intraday_next_open" or "overnight_tplus2"
  lot_size: 1000
  min_fee: 20
  intraday_buy_fee_rate: 0.001425
  intraday_sell_fee_rate: 0.002925
  overnight_buy_fee_rate: 0.001425
  overnight_sell_fee_rate: 0.004425
  settlement_delay_days: 2

training:
  backend: pytorch
  model_name: MLP
  num_layers: 2
  residual_norm: false
  target: next_1d_rank
  batch_mode: time_window_x_all_symbols
  non_blocking_transfer: false
  lookback: 1
  batch_size: 1024
  batch_size_train: 1024
  batch_size_eval: 1024
  epochs: 1000
  learning_rate: 0.001
  hidden_dim: 512
  dropout: 0.1
  num_workers: 28
  weight_decay: 0.00001
  loss_type: sharpe
  xgb_n_estimators: 600
  xgb_max_depth: 12
  xgb_learning_rate: 0.05
  xgb_subsample: 0.8
  xgb_colsample_bytree: 0.8
  xgb_reg_lambda: 1.0
  ridge_alpha: 1.0
  ridge_fit_intercept: true
  elasticnet_alpha: 1.0
  elasticnet_l1_ratio: 0.5
  elasticnet_fit_intercept: true
  elasticnet_max_iter: 2000
  elasticnet_tol: 0.0001
  min_batch_size: 4
  auto_batch_size: true
  vram_budget_gb: 16
  vram_safety_margin_gb: 2.5
  target_vram_fraction: 0.7

evaluation:
  primary_baseline: "0050"
  metrics:
    - cumulative_return
    - annualized_return
    - sharpe
    - max_drawdown
    - turnover
    - excess_return_vs_universe_average
  gamma_sharpe: 1.0
  gamma_turnover: 0.0